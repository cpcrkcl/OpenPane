name: macOS CI

on:
  pull_request:
  push:

jobs:
  build-and-test:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build
        run: >-
          xcodebuild build
          -project OpenPane.xcodeproj
          -scheme OpenPane
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: >-
          xcodebuild test
          -project OpenPane.xcodeproj
          -scheme OpenPane
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO

      - name: Build with complete strict concurrency checking
        run: >-
          xcodebuild build
          -project OpenPane.xcodeproj
          -scheme OpenPane
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          SWIFT_STRICT_CONCURRENCY=complete
          SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
